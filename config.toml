[api]
  clob_url = "https://clob.polymarket.com"
  gamma_url = "https://gamma-api.polymarket.com"
  data_url = "https://data-api.polymarket.com"
  ws_url = "wss://ws-subscriptions-clob.polymarket.com/ws/"
  timeout_sec = 10
  max_retries = 3

[auth]
  private_key = ""
  api_key = ""
  api_secret = ""
  passphrase = ""
  chain_id = 137

[trading]
  enabled = false
  max_position_usd = 100.0
  slippage_pct = 0.5
  default_order_type = "GTC"
  neg_risk = false

[monitor]
  enabled = true
  poll_interval_ms = 1000
  markets = []
  [monitor.trades]
    enabled = false
    poll_interval_ms = 5000
    track_positions = true
    alert_on_fill = true
    alert_on_cancel = true
    trades_limit = 50

[telegram]
  enabled = false
  bot_token = ""
  chat_id = ""

[database]
  enabled = false
  path = "./data/polytrade.db"

[log]
  level = "trace"
  format = "pretty"

[copytrading]
  enabled = false
  poll_interval_ms = 10000
  size_mode = "proportional"

[ui]
language = "en"
