<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Neom Glow Filters -->
    <filter id="glow-purple" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Gradients -->
    <linearGradient id="orbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9d00ff" />
      <stop offset="100%" stop-color="#3b0066" />
    </linearGradient>
    
    <linearGradient id="ringGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00fff9" />
      <stop offset="100%" stop-color="transparent" />
    </linearGradient>
  </defs>

  <!-- Background/Base -->
  <rect width="200" height="200" fill="transparent" />

  <!-- Orbital Rings -->
  <g transform="translate(100, 100)">
    <!-- Outer Ring -->
    <ellipse cx="0" cy="0" rx="75" ry="30" 
             fill="none" 
             stroke="url(#ringGrad)" 
             stroke-width="2" 
             transform="rotate(30)" 
             filter="url(#glow-cyan)"
             opacity="0.8" />
             
    <!-- Inner Ring -->
    <ellipse cx="0" cy="0" rx="60" ry="20" 
             fill="none" 
             stroke="#ff00c8" 
             stroke-width="1.5" 
             transform="rotate(-45)" 
             filter="url(#glow-purple)"
             opacity="0.6" />

    <!-- Core Sphere -->
    <circle cx="0" cy="0" r="35" 
            fill="url(#orbGrad)" 
            filter="url(#glow-purple)" />
            
    <!-- Inner Core Highlight -->
    <circle cx="-10" cy="-10" r="10" 
            fill="#d480ff" 
            opacity="0.5" 
            filter="url(#glow-cyan)" />
            
    <!-- Center Dot -->
    <circle cx="0" cy="0" r="4" fill="#00fff9" filter="url(#glow-cyan)"/>
  </g>
  
  <!-- Data Nodes (Dots on rings) -->
  <g transform="translate(100, 100)">
    <circle cx="65" cy="-25" r="3" fill="#00fff9" filter="url(#glow-cyan)"/>
    <circle cx="-50" cy="35" r="2.5" fill="#ff00c8" filter="url(#glow-purple)"/>
    <circle cx="-20" cy="-45" r="2" fill="#fff" filter="url(#glow-cyan)"/>
  </g>
</svg>
