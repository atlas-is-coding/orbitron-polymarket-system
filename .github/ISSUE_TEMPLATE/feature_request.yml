name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? We'd love to hear it. Please describe it clearly below.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of Orbitron would this affect?
      options:
        - Trading Strategy (new strategy)
        - TUI
        - Web UI
        - Telegram Bot
        - Copy Trading
        - Monitor / Alerts
        - Configuration
        - Authentication
        - Performance
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? What is currently missing or painful?
      placeholder: "Currently, I have to ... which is inconvenient because ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've considered?

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to submit a pull request for this feature
