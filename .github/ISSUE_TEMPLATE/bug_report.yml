name: Bug Report
description: Something is not working as expected
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Orbitron is affected?
      options:
        - TUI (Terminal UI)
        - Web UI
        - Telegram Bot
        - Trading Engine / Strategy
        - Copy Trading
        - Monitor / Alerts
        - WebSocket
        - Authentication (L1/L2)
        - Configuration
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Set config option ...
        2. Run `./orbitron --config config.toml`
        3. Navigate to tab ...
        4. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant log output (set `log.level = "debug"` in config.toml for more detail).
      render: text

  - type: input
    id: version
    attributes:
      label: Orbitron Version
      placeholder: v1.0.0 or commit hash
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux (amd64)
        - Linux (arm64)
        - macOS (amd64)
        - macOS (arm64)
        - Windows
    validations:
      required: true

  - type: input
    id: go_version
    attributes:
      label: Go Version
      placeholder: go version go1.24.0 linux/amd64
