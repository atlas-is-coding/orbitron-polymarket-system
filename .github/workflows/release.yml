name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: internal/webui/web/package-lock.json

      - name: Build Vue 3 frontend
        run: |
          cd internal/webui/web
          npm ci
          npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: internal/webui/web/dist/
          retention-days: 1

  build:
    name: Build / ${{ matrix.goos }}-${{ matrix.goarch }}
    needs: build-frontend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ''
          - goos: linux
            goarch: arm64
            ext: ''
          - goos: darwin
            goarch: amd64
            ext: ''
          - goos: darwin
            goarch: arm64
            ext: ''
          - goos: windows
            goarch: amd64
            ext: '.exe'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: internal/webui/web/dist/

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          LDFLAGS="-s -w"

          if [ -n "${{ secrets.LICENSE_RAW_TOKEN }}" ]; then
            LDFLAGS="$LDFLAGS -X 'github.com/atlasdev/orbitron/internal/license.rawToken=${{ secrets.LICENSE_RAW_TOKEN }}'"
          fi
          if [ -n "${{ secrets.LICENSE_SERVER_URL }}" ]; then
            LDFLAGS="$LDFLAGS -X 'github.com/atlasdev/orbitron/internal/license.LicenseServerURL=${{ secrets.LICENSE_SERVER_URL }}'"
          fi

          mkdir -p dist
          go build \
            -ldflags="$LDFLAGS" \
            -o "dist/orbitron-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" \
            ./cmd/bot/

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: dist/
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/orbitron-*
            dist/checksums.txt
            setup.sh
          generate_release_notes: true
          draft: false
          fail_on_unmatched_files: true
